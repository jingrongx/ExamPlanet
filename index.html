<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <!-- 移动端 APP 适配：禁止缩放、覆盖刘海安全区 -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0a0e27" />
    <meta name="description" content="考证星球 - 把考证变成上瘾的太空冒险" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="考证星球" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <title>考证星球 CertPlanet</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet"
      />
    </noscript>
    <style>
      /* 启动闪屏：在 React 加载前显示 */
      #boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: radial-gradient(ellipse at top, #1a1147 0%, #0a0e27 40%, #050818 100%);
        z-index: 9999;
        transition: opacity 0.4s;
      }
      #boot.hide { opacity: 0; pointer-events: none; }
      #boot .logo {
        font-size: 4rem;
        animation: boot-spin 2s linear infinite;
        filter: drop-shadow(0 0 16px #00f5ff);
      }
      #boot .title {
        font-family: 'Orbitron', sans-serif;
        font-weight: 900;
        font-size: 1.5rem;
        letter-spacing: 0.15em;
        margin-top: 1rem;
        background: linear-gradient(135deg, #00f5ff, #ff2e88);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      #boot .sub {
        font-family: 'Rajdhani', sans-serif;
        color: #e0e0ff80;
        font-size: 0.75rem;
        letter-spacing: 0.2em;
        margin-top: 0.25rem;
      }
      @keyframes boot-spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="boot">
      <div class="logo">🪐</div>
      <div class="title">考证星球</div>
      <div class="sub">CERT · PLANET</div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
