<svg xmlns="http://www.w3.org/2000/svg" width="2732" height="2732" viewBox="0 0 2732 2732">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="80%">
      <stop offset="0%" stop-color="#1a1147"/>
      <stop offset="50%" stop-color="#0a0e27"/>
      <stop offset="100%" stop-color="#050818"/>
    </radialGradient>
    <radialGradient id="planet" cx="35%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#ff5fa0"/>
      <stop offset="60%" stop-color="#ff2e88"/>
      <stop offset="100%" stop-color="#9d4edd"/>
    </radialGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff2e88"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="2732" height="2732" fill="url(#bg)"/>
  <!-- 星空 -->
  <g fill="#ffffff">
    <circle cx="400" cy="500" r="8" opacity="0.9"/>
    <circle cx="2300" cy="450" r="6" opacity="0.8"/>
    <circle cx="350" cy="1900" r="5" opacity="0.7"/>
    <circle cx="2400" cy="2100" r="9" opacity="0.9"/>
    <circle cx="600" cy="2400" r="6" opacity="0.7"/>
    <circle cx="2100" cy="650" r="5" opacity="0.6"/>
    <circle cx="280" cy="1200" r="7" opacity="0.8"/>
    <circle cx="2500" cy="1400" r="6" opacity="0.7"/>
    <circle cx="800" cy="300" r="4" opacity="0.5"/>
    <circle cx="1900" cy="2450" r="5" opacity="0.6"/>
    <circle cx="150" cy="800" r="4" opacity="0.5"/>
    <circle cx="2600" cy="900" r="4" opacity="0.5"/>
  </g>
  <!-- 行星环 -->
  <ellipse cx="1366" cy="1366" rx="900" ry="260" fill="none" stroke="url(#ring)" stroke-width="32" opacity="0.85" transform="rotate(-20 1366 1366)" filter="url(#glow)"/>
  <ellipse cx="1366" cy="1366" rx="900" ry="260" fill="none" stroke="#00f5ff" stroke-width="6" opacity="0.4" transform="rotate(-20 1366 1366)"/>
  <!-- 星球 -->
  <circle cx="1366" cy="1366" r="520" fill="url(#planet)" filter="url(#glow)"/>
  <ellipse cx="1240" cy="1180" rx="180" ry="110" fill="#ffffff" opacity="0.25"/>
  <path d="M 1050 1450 Q 1200 1490 1366 1460 Q 1530 1430 1680 1470" stroke="#9d4edd" stroke-width="10" fill="none" opacity="0.6"/>
  <path d="M 1100 1610 Q 1280 1640 1460 1610" stroke="#ff2e88" stroke-width="8" fill="none" opacity="0.5"/>
  <!-- 卫星 -->
  <circle cx="2050" cy="1000" r="32" fill="#00f5ff" filter="url(#glow)"/>
  <circle cx="2050" cy="1000" r="14" fill="#ffffff"/>
</svg>
